<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/pacers-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Indiana Pacers analytics dashboard — live roster, player stats, team profile, performance trends, and franchise history." />
    <meta name="theme-color" content="#002D62" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
    <title>Indiana Pacers — Court Command</title>
    <script>
      window.addEventListener('error', function(event) {
        document.body.innerHTML += '<div style="position:fixed;top:0;left:0;z-index:9999;background:red;color:white;padding:20px;font-family:sans-serif;font-size:16px;">ERROR: ' + event.message + ' at ' + event.filename + ':' + event.lineno + '<br><pre>' + (event.error && event.error.stack ? event.error.stack : '') + '</pre></div>';
      });
      window.addEventListener('unhandledrejection', function(event) {
        document.body.innerHTML += '<div style="position:fixed;top:0;left:0;z-index:9999;background:red;color:white;padding:20px;font-family:sans-serif;font-size:16px;">UNHANDLED PROMISE: ' + event.reason + '</div>';
      });
    </script>
  </head>
  <body>
    <script>
      (function() {
        var theme = localStorage.getItem('pacers-theme') || 'modern-navy';
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
